<!DOCTYPE html>
<html>
<head>
<style>

*{margin:0;box-sizing:border-box}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ddd;
font-family:Arial;
}

.c{
width:1000px;
height:500px;
border:5px solid #fff;
display:flex;
flex-direction:column;
}

.t,.b,.l,.x{
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.t,.b{
height:80px;
background:#bbb;
font-size:30px;
}

.t{border-bottom:5px solid #fff}
.b{border-top:5px solid #fff}

.m{
flex:1;
display:flex;
}

.l{
flex:3;
background:#999;
font-size:50px;
border-right:5px solid #fff;
}

.r{
flex:1;
display:flex;
flex-direction:column;
}

.x{
flex:1;
background:#aaa;
font-size:40px;
border-bottom:5px solid #fff;
}

.x:last-child{
border:none;
}

</style>
</head>

<body>

<div class="c">

<div class="t">TOP</div>

<div class="m">

<div class="l">LEFT</div>

<div class="r">
<div class="x">1</div>
<div class="x">2</div>
<div class="x">3</div>
</div>

</div>

<div class="b">BOTTOM</div>

</div>

</body>
</html>
