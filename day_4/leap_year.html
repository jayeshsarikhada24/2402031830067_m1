<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
</head>

<body>
    <script>
        let year = 2020;
        if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
            document.write("The year is a leap year.");
        } else {
            document.write("The year is not a leap year.");
        }
    </script>
</body>

</html>
</body>
