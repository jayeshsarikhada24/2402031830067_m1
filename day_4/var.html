<html>

<body>
    <h1>java script variables</h1>

    <h4>in thisexamples,x,y, and z are variables </h4>
    <p id="z"></p>
    <p id="d"></p>
    <p id="c"></p>
    <p id="e"></p>
    <script>
        var x = 5;
        var y = 6;
        var z = x + y;
        document.getElementById("z").innerHTML = "value of z is " + z + "<br>";
        var a = 5;
        var b = 6;
        var d = a - b;
        document.getElementById("d").innerHTML = "value of d is " + d + "<br>";
        var c = a * b;
        document.getElementById("c").innerHTML = "value of c is " + c + "<br>";
        var e = a / b;
        document.getElementById("e").innerHTML = "value of e is " + e;
    </script>

</body>

</html>
