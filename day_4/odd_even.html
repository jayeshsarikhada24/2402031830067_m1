<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
</head>

<body>
    <script>
        let number = 5;
        if (number % 2 === 0) {
            document.write("The number is even.");
        } else {
            document.write("The number is odd.");
        }
    </script>
</body>

</html>
