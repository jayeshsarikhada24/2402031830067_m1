<!DOCTYPE html>
<html lang="en">

<head>

    <title>find datatype</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="box"></div>
    <h1>Find Data Type</h1>
    <script>
        var a = true;
        document.write("datatype of a: " + typeof a + "<br>");
        var b = "hello";
        document.write("datatype of b: " + typeof b + "<br>");
        var c = 5;
        document.write("datatype of c: " + typeof c + "<br>");
        var d = 3.14;
        document.write("datatype of d: " + typeof d + "<br>");
        var arr = [1, 2, 3];
        document.write("datatype of arr: " + typeof arr + "<br>");
    </script>
</body>

</html>
