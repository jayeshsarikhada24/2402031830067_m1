<!DOCTYPE html>
<html>

<body>

    <script>
        var x = 5;
        var y = ++x;
        document.write("Pre Increment = " + y + "<br>");

        var x = 5;
        var y = x++;
        document.write("Post Increment = " + y + "<br>");

        var x = 5;
        var y = --x;
        document.write("Pre Decrement = " + y + "<br>");

        var x = 5;
        var y = x--;
        document.write("Post Decrement = " + y + "<br>");
    </script>

</body>

</html>
