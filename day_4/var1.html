<html>

<body>
    <h1>java script variables</h1>

    <h4>in thisexamples,x,y, and z are variables </h4>

    <script>
        var x = 5;
        var y = 6;
        var z = x + y;
        document.write("value of z is " + z + "<br>");
        var a = 5;
        var b = 6;
        var d = a - b;
        document.write("value of d is " + d + "<br>");
        var c = a * b;
        document.write("value of c is " + c + "<br>");
        var e = a / b;
        document.write("value of e is " + e);
    </script>

</body>

</html>
