<!DOCTYPE html>
<html lang="en">

<head>

    <title>if else</title>
</head>

<body>
    <script>
        let age = 10;
        if (age >= 18) {
            document.write("You are eligible to vote.");
        } else {
            document.write("You are not eligible to vote.");
        }
    </script>
</body>

</html>
