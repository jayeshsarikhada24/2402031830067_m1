<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JavaScript String Methods</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f4f4;
      padding:20px;
    }

    h1{
      text-align:center;
      color:#333;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      width:80%;
      margin:auto;
    }

    p{
      font-size:18px;
      margin:10px 0;
    }
  </style>
</head>
<body>

  <h1>JavaScript String Methods Examples</h1>

  <div class="box" id="output"></div>

  <script>

    let str1 = "Hello";
    let str2 = "World";
    let text = "   JavaScript String Methods   ";

    let output = document.getElementById("output");

    output.innerHTML += "<p><b>charAt(1):</b> " + str1.charAt(1) + "</p>";

    output.innerHTML += "<p><b>concat():</b> " + str1.concat(" ", str2) + "</p>";

    output.innerHTML += "<p><b>indexOf('o'):</b> " + str1.indexOf("o") + "</p>";

    output.innerHTML += "<p><b>lastIndexOf('l'):</b> " + str1.lastIndexOf("l") + "</p>";

    output.innerHTML += "<p><b>search('World'):</b> " + str2.search("World") + "</p>";

    output.innerHTML += "<p><b>match('Hello'):</b> " + str1.match("Hello") + "</p>";

    output.innerHTML += "<p><b>replace():</b> " + str1.replace("Hello","Hi") + "</p>";

    output.innerHTML += "<p><b>substr(1,3):</b> " + str1.substr(1,3) + "</p>";

    output.innerHTML += "<p><b>substring(1,4):</b> " + str1.substring(1,4) + "</p>";

    output.innerHTML += "<p><b>slice(1,4):</b> " + str1.slice(1,4) + "</p>";

    output.innerHTML += "<p><b>toLowerCase():</b> " + str1.toLowerCase() + "</p>";

    output.innerHTML += "<p><b>toLocaleLowerCase():</b> " + str1.toLocaleLowerCase() + "</p>";

    output.innerHTML += "<p><b>toUpperCase():</b> " + str1.toUpperCase() + "</p>";

    output.innerHTML += "<p><b>toLocaleUpperCase():</b> " + str1.toLocaleUpperCase() + "</p>";

    output.innerHTML += "<p><b>toString():</b> " + str1.toString() + "</p>";

    output.innerHTML += "<p><b>valueOf():</b> " + str1.valueOf() + "</p>";

    output.innerHTML += "<p><b>split():</b> " + str1.split('') + "</p>";

    output.innerHTML += "<p><b>trim():</b> " + text.trim() + "</p>";

  </script>

</body>
</html>
