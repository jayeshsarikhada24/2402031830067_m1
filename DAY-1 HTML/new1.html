<!DOCTYPE html>
<html>
<head>
    <title>Table Example</title>
</head>
<body>

<table border="1" cellspacing="2" height="200" width="500">

   
    <tr align="center">
        <td colspan="2">A</td>
        <td colspan="5">B</td>
    </tr>

  
    <tr align="center">
        <td rowspan="3">C</td>
        <td>D</td>
        <td>E</td>
        <td rowspan="2">F</td>
        <td>G</td>
        <td>H</td>
    </tr>

    <tr align="center">
        <td>I</td>
        <td>J</td>
        <td colspan="2">K</td>
    </tr>

    
    <tr align="center">
        <td>L</td>
        <td>M</td>
        <td>N</td>
        <td>O</td>
        <td>P</td>
    </tr>

</table>

</body>
</html>
